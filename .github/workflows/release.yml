name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-macos:
    name: Release (macOS)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Make distributable
        run: pnpm --filter @queuepilot/desktop make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: queuepilot-macos
          path: apps/desktop/out/make/**/*

  release-windows:
    name: Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Make distributable
        run: pnpm --filter @queuepilot/desktop make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: queuepilot-windows
          path: apps/desktop/out/make/**/*

  release-linux:
    name: Release (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-setuptools rpm fakeroot dpkg

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Make distributable
        run: pnpm --filter @queuepilot/desktop make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: queuepilot-linux
          path: apps/desktop/out/make/**/*

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-macos, release-windows, release-linux]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-mcp:
    name: Publish MCP to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version
        working-directory: plugin/mcp

      - name: Install MCP dependencies
        run: npm install
        working-directory: plugin/mcp

      - name: Build MCP server
        run: npm run build
        working-directory: plugin/mcp

      - name: Publish to npm
        run: npm publish
        working-directory: plugin/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
