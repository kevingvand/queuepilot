name: Bug Report
description: Report something that is broken or behaving unexpectedly.
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill this out. The more detail you provide, the faster we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps to reliably reproduce the behavior.
      placeholder: |
        1. Open QueuePilot
        2. Navigate to ...
        3. Click / press ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages and stack traces if available.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: QueuePilot version
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      description: Run `node --version` in your terminal.
      placeholder: "e.g. v20.11.0"
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Screenshots, log output, database state, or anything else relevant.
    validations:
      required: false
